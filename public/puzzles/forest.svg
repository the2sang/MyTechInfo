  <circle cx="190" cy="320" r="3" fill="#a8d5a2" opacity="0.9"/>
  <circle cx="190" cy="320" r="6" fill="#a8d5a2" opacity="0.25"/>
  <circle cx="420" cy="280" r="3" fill="#c8e6c9" opacity="0.85"/>
  <circle cx="420" cy="280" r="7" fill="#c8e6c9" opacity="0.2"/>
  <circle cx="230" cy="400" r="2.5" fill="#a8d5a2" opacity="0.8"/>
