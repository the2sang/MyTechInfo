  <polygon points="12,110 -10,200 34,200" fill="#0d3b22"/>
  <rect x="30" y="150" width="22" height="300" fill="#0d3b22" rx="3"/>
  <polygon points="41,100 22,195 60,195" fill="#0a2818"/>
