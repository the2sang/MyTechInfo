  <rect x="565" y="215" width="40" height="385" fill="#061510" rx="3"/>
  <polygon points="585,138 558,245 612,245" fill="#0a1f14"/>
  <polygon points="585,172 560,265 610,265" fill="#061510"/>
  <rect x="465" y="195" width="35" height="405" fill="#061510" rx="3"/>
  <polygon points="482,115 458,210 506,210" fill="#061510"/>
  <polygon points="482,150 460,238 504,238" fill="#0a1f14"/>
