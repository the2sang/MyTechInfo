  <path d="M140 560 Q160 520 140 490 Q120 520 140 560" fill="#0d3b22" opacity="0.7"/>
  <path d="M460 550 Q480 510 460 480 Q440 510 460 550" fill="#0d3b22" opacity="0.7"/>
  <path d="M170 580 Q200 545 185 515" stroke="#0d3b22" stroke-width="3" fill="none" opacity="0.6"/>
