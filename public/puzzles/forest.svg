<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#0d3b2e"/>
      <stop offset="100%" stop-color="#1a5c3a"/>
    </linearGradient>
    <linearGradient id="ground4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c3a"/>
      <stop offset="100%" stop-color="#0a2818"/>
    </linearGradient>
    <linearGradient id="path4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c59" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a5c3a" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="light-ray" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#a8d5a2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a8d5a2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-forest" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8f5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="600" fill="url(#sky4)"/>
  <!-- Moon glow through trees -->
  <circle cx="300" cy="80" r="90" fill="url(#moon-forest)"/>
  <!-- Moon -->
  <circle cx="300" cy="80" r="42" fill="#e8f5e9"/>
  <circle cx="312" cy="72" r="35" fill="#f1f8e9"/>
  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#a8d5a2" opacity="0.8"/>
  <circle cx="150" cy="25" r="2" fill="white" opacity="0.7"/>
  <circle cx="220" cy="50" r="1" fill="#a8d5a2" opacity="0.6"/>
  <circle cx="400" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="470" cy="55" r="2" fill="#a8d5a2" opacity="0.7"/>
