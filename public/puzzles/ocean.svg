<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="35%" stop-color="#1b4f72"/>
      <stop offset="65%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="40%" stop-color="#154360"/>
      <stop offset="100%" stop-color="#0a2535"/>
    </linearGradient>
    <radialGradient id="sun3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="60%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="600" fill="url(#sky3)"/>
  <!-- Sun glow large -->
  <circle cx="300" cy="280" r="130" fill="#e67e22" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="300" cy="280" r="55" fill="url(#sun3)"/>
  <circle cx="300" cy="280" r="40" fill="#f39c12"/>
  <circle cx="300" cy="280" r="30" fill="#ffd54f"/>
  <!-- Sun reflection column -->
  <rect x="285" y="320" width="30" height="160" fill="#f39c12" opacity="0.25" rx="4"/>
  <rect x="292" y="320" width="16" height="160" fill="#ffd54f" opacity="0.2" rx="2"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="120" rx="80" ry="25" fill="#1b4f72" opacity="0.7"/>
  <ellipse cx="100" cy="108" rx="55" ry="20" fill="#2471a3" opacity="0.5"/>
  <ellipse cx="520" cy="100" rx="90" ry="28" fill="#1b4f72" opacity="0.65"/>
  <ellipse cx="500" cy="88" rx="60" ry="22" fill="#2471a3" opacity="0.5"/>
  <ellipse cx="200" cy="170" rx="65" ry="20" fill="#1a5276" opacity="0.5"/>
  <ellipse cx="420" cy="160" rx="55" ry="18" fill="#1a5276" opacity="0.45"/>
  <!-- Stars faint -->
  <circle cx="80" cy="40" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="180" cy="55" r="1" fill="white" opacity="0.4"/>
  <circle cx="450" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="550" cy="60" r="1" fill="white" opacity="0.4"/>
  <!-- Horizon line -->
  <rect y="320" x="0" width="600" height="280" fill="url(#ocean)"/>
  <!-- Distant island silhouette -->
  <ellipse cx="480" cy="325" rx="60" ry="18" fill="#0a2535"/>
  <rect x="468" y="290" width="8" height="38" fill="#0a2535"/>
  <!-- Lighthouse on island -->
  <rect x="472" y="270" width="10" height="30" fill="#e74c3c"/>
  <polygon points="477,265 467,272 487,272" fill="#c0392b"/>
  <circle cx="477" cy="265" r="5" fill="#ffd54f" opacity="0.8"/>
  <!-- Wave 1 -->
  <path d="M0 350 Q75 335 150 350 Q225 365 300 350 Q375 335 450 350 Q525 365 600 350 L600 380 L0 380Z" fill="#1a5276" opacity="0.8"/>
  <!-- Wave 2 -->
  <path d="M0 390 Q60 378 120 390 Q180 402 240 390 Q300 378 360 390 Q420 402 480 390 Q540 378 600 390 L600 420 L0 420Z" fill="#154360" opacity="0.9"/>
  <!-- Wave 3 -->
  <path d="M0 430 Q75 418 150 430 Q225 442 300 430 Q375 418 450 430 Q525 442 600 430 L600 470 L0 470Z" fill="#0f3549"/>
  <!-- Wave foam hints -->
  <path d="M0 350 Q75 335 150 350" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M300 350 Q375 335 450 350" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M0 390 Q60 378 120 390" stroke="white" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M240 390 Q300 378 360 390" stroke="white" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Deep water -->
  <rect y="470" width="600" height="130" fill="#0a2535"/>
  <!-- Foreground wave -->
  <path d="M0 500 Q100 485 200 500 Q300 515 400 500 Q500 485 600 500 L600 540 L0 540Z" fill="#0f3549" opacity="0.9"/>
  <path d="M0 500 Q100 485 200 500 Q300 515 400 500 Q500 485 600 500" stroke="white" stroke-width="2" fill="none" opacity="0.2"/>
  <!-- Shore -->
  <path d="M0 560 Q150 545 300 560 Q450 575 600 560 L600 600 L0 600Z" fill="#1a3a4a"/>
  <!-- Rocks -->
  <ellipse cx="80" cy="560" rx="35" ry="15" fill="#0a1a25"/>
  <ellipse cx="520" cy="570" rx="28" ry="12" fill="#0a1a25"/>
  <!-- Reflection sparkles -->
  <circle cx="270" cy="380" r="3" fill="white" opacity="0.4"/>
  <circle cx="310" cy="360" r="2" fill="white" opacity="0.5"/>
  <circle cx="330" cy="400" r="2" fill="white" opacity="0.3"/>
  <circle cx="285" cy="415" r="3" fill="white" opacity="0.35"/>
  <circle cx="315" cy="440" r="2" fill="white" opacity="0.3"/>
</svg>
