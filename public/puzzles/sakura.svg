<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="40%" stop-color="#1a1a5e"/>
      <stop offset="100%" stop-color="#4a1a6e"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fffde7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="600" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.7"/>
  <circle cx="200" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="300" cy="60" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="380" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="450" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="520" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="80" cy="150" r="1" fill="white" opacity="0.5"/>
  <circle cx="160" cy="130" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="480" cy="130" r="1" fill="white" opacity="0.7"/>
  <circle cx="560" cy="100" r="2" fill="white" opacity="0.6"/>
  <circle cx="30" cy="200" r="1" fill="white" opacity="0.4"/>
  <circle cx="550" cy="180" r="1.5" fill="white" opacity="0.7"/>
  <!-- Moon glow -->
  <circle cx="420" cy="120" r="70" fill="url(#moon-glow)"/>
  <!-- Moon -->
  <circle cx="420" cy="120" r="48" fill="#fffde7"/>
  <circle cx="440" cy="100" r="40" fill="#fff9c4"/>
  <!-- Moon craters -->
  <circle cx="400" cy="130" r="8" fill="#fff176" opacity="0.5"/>
  <circle cx="425" cy="140" r="5" fill="#fff176" opacity="0.4"/>
  <circle cx="415" cy="105" r="4" fill="#fff176" opacity="0.3"/>
  <!-- Ground -->
  <rect y="480" width="600" height="120" fill="url(#ground)"/>
  <!-- Hill -->
  <ellipse cx="300" cy="520" rx="320" ry="80" fill="#12082a"/>
  <!-- Tree trunk left -->
  <rect x="60" y="320" width="20" height="200" fill="#3e2723" rx="4"/>
  <!-- Branches left -->
  <path d="M70 380 Q20 340 -10 300" stroke="#3e2723" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M70 350 Q100 290 140 260" stroke="#3e2723" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M70 420 Q30 400 0 380" stroke="#3e2723" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M75 400 Q110 370 150 340" stroke="#3e2723" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Cherry blossoms left -->
  <circle cx="10" cy="295" r="18" fill="#f48fb1" opacity="0.85"/>
  <circle cx="-5" cy="310" r="14" fill="#f06292" opacity="0.75"/>
  <circle cx="145" cy="255" r="16" fill="#f48fb1" opacity="0.9"/>
  <circle cx="160" cy="240" r="12" fill="#fce4ec" opacity="0.8"/>
  <circle cx="130" cy="250" r="10" fill="#f06292" opacity="0.7"/>
  <circle cx="-5" cy="375" r="12" fill="#f48fb1" opacity="0.7"/>
  <circle cx="155" cy="335" r="14" fill="#fce4ec" opacity="0.8"/>
  <!-- Tree trunk right -->
  <rect x="520" y="280" width="18" height="240" fill="#3e2723" rx="4"/>
  <!-- Branches right -->
  <path d="M529 320 Q580 270 610 240" stroke="#3e2723" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M529 360 Q490 310 460 280" stroke="#3e2723" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M529 400 Q570 380 600 370" stroke="#3e2723" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M529 340 Q500 300 480 270" stroke="#3e2723" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Cherry blossoms right -->
  <circle cx="615" cy="235" r="16" fill="#f48fb1" opacity="0.85"/>
  <circle cx="600" cy="248" r="12" fill="#f06292" opacity="0.75"/>
  <circle cx="458" cy="274" r="15" fill="#fce4ec" opacity="0.9"/>
  <circle cx="472" cy="262" r="10" fill="#f48fb1" opacity="0.7"/>
  <circle cx="600" cy="365" r="14" fill="#fce4ec" opacity="0.75"/>
  <!-- Falling petals -->
  <circle cx="200" cy="200" r="5" fill="#f48fb1" opacity="0.7"/>
  <circle cx="250" cy="280" r="4" fill="#fce4ec" opacity="0.6"/>
  <circle cx="180" cy="350" r="5" fill="#f06292" opacity="0.65"/>
  <circle cx="320" cy="180" r="4" fill="#f48fb1" opacity="0.5"/>
  <circle cx="350" cy="300" r="3" fill="#fce4ec" opacity="0.7"/>
  <circle cx="400" cy="220" r="5" fill="#f48fb1" opacity="0.6"/>
  <circle cx="290" cy="400" r="4" fill="#f06292" opacity="0.5"/>
  <!-- Path -->
  <ellipse cx="300" cy="560" rx="80" ry="15" fill="#2d1b69" opacity="0.5"/>
  <!-- Lantern -->
  <rect x="278" y="440" width="8" height="60" fill="#5d4037"/>
  <rect x="265" y="440" width="34" height="40" fill="#f57f17" opacity="0.85" rx="4"/>
  <rect x="265" y="440" width="34" height="40" fill="none" stroke="#e65100" stroke-width="2" rx="4"/>
  <line x1="282" y1="440" x2="282" y2="480" stroke="#e65100" stroke-width="1" opacity="0.5"/>
</svg>
