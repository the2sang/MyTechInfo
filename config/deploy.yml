service: mytechinfo

image: rumanesystem/mytechinfo

servers:
  web:
    - YOUR_SERVER_IP   # 배포 대상 서버 IP로 교체

# SSL + 도메인 설정 (서버 도메인 확정 후 주석 해제)
# proxy:
#   ssl: true
#   host: your-domain.com

registry:
  server: docker.io
  username: rumanesystem
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_TO_STDOUT: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "mytechinfo_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  # Apple Silicon(arm64) Mac에서 빌드 시 멀티플랫폼 에뮬레이션 사용
  # 속도 향상이 필요하면 amd64 원격 빌드 서버 설정:
  # remote: ssh://user@build-server

ssh:
  user: root
